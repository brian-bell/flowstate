# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: flowstate

builds:
  - id: flowstate
    main: ./cmd/flowstate
    binary: flowstate
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/brian-bell/flowstate/internal/version.version={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ .Tag }}{{ end }}
        -X github.com/brian-bell/flowstate/internal/version.commit={{ .ShortCommit }}
        -X github.com/brian-bell/flowstate/internal/version.date={{ .Date }}

archives:
  - id: flowstate
    ids:
      - flowstate
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256
