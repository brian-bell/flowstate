name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.9.0

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: make test

      - name: Build
        run: make build

      - name: Check embedded web assets
        run: test -z "$(git status --porcelain -- server/webassets/dist)"
